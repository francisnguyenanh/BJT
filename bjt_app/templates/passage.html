{% extends "base.html" %}
{% block title %}{{ p.title }} — BJT Study{% endblock %}
{% block content %}
<div id="passage-root">
{% include "passage_content.html" %}
</div>

<script>
function currentPassageData() {
  const el = document.getElementById('passage-data');
  return el ? JSON.parse(el.textContent) : {};
}

// Swap #passage-root content in place instead of reloading the whole page,
// so changing length/level/regenerating stays on the same page (no flash / no full reload).
async function loadPassage(url, { push = true } = {}) {
  const root = document.getElementById('passage-root');
  root.classList.add('loading');
  try {
    const fragUrl = url + (url.includes('?') ? '&' : '?') + 'fragment=1';
    const res = await fetch(fragUrl, { headers: { 'X-Requested-With': 'fetch' } });
    const data = await res.json();
    if (!data.ok) return;
    root.innerHTML = data.html;
    document.title = data.title;
    if (push) history.pushState({ url }, '', url);
    initPassageInteractions();
  } finally {
    root.classList.remove('loading');
  }
}

function initPassageInteractions() {
  document.querySelectorAll('.length-tab, .level-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      e.preventDefault();
      loadPassage(tab.getAttribute('href'));
    });
  });

  window.BJT.initSectionToggles();
  window.BJT.initReadingToolbar();
  window.BJT.initTtsButton();
  window.BJT.initStarButtons(() => {
    const pd = currentPassageData();
    return { date: pd.date, length: pd.length, pageLevel: pd.level, title: pd.title };
  });

  const regenBtn = document.getElementById('regen-top');
  regenBtn.addEventListener('click', async (e) => {
    const btn = e.target;
    btn.disabled = true;
    btn.textContent = 'Đang tạo...';
    const date = btn.dataset.date;
    const length = btn.dataset.length;
    const level = btn.dataset.level;
    const res = await fetch(`/passage/${date}/regenerate?length=${length}&level=${level}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      const root = document.getElementById('passage-root');
      root.innerHTML = data.html;
      document.title = data.title;
      history.pushState({ url: data.redirect }, '', data.redirect);
      initPassageInteractions();
    }
  });

  document.querySelectorAll('.question').forEach(q => {
    const correct = parseInt(q.dataset.answer, 10);
    const exp = q.querySelector('.explanation');
    q.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => {
        if (q.classList.contains('answered')) return;
        q.classList.add('answered');
        const idx = parseInt(btn.dataset.index, 10);
        q.querySelectorAll('.option').forEach(b => {
          const bidx = parseInt(b.dataset.index, 10);
          if (bidx === correct) b.classList.add('correct');
          else if (bidx === idx) b.classList.add('wrong');
        });
        exp.classList.remove('hidden');
      });
    });
  });
}

initPassageInteractions();

window.addEventListener('popstate', () => {
  loadPassage(location.pathname + location.search, { push: false });
});
</script>
{% endblock %}
