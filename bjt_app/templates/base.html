<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BJT Study{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js"></script>
</head>
<body>
  <nav class="topnav">
    <a href="/">📖 Đọc hôm nay</a>
    <a href="/history">🗂 Lịch sử</a>
    <a href="/vocab">⭐ Luyện tập</a>
    <a href="/settings">⚙️ Cài đặt AI</a>
    <button id="theme-toggle" class="icon-btn" aria-label="Đổi giao diện sáng/tối" title="Đổi giao diện sáng/tối">🌓</button>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      window.BJT.toggleTheme();
    });
  </script>
</body>
</html>
