; Vertex AI Gemini - config template colocated in ai_module
; Suggested usage:
;   GeminiClient.from_ini("ai_module/config/vertex.config.ini")

[vertexai]
project_id = your-gcp-project-id
model = gemini-2.5-flash-lite
fallback_model = gemini-2.5-flash
regions = us-central1, europe-west4, asia-northeast1, asia-southeast1

[vision]
; Put service account JSON at ai_module/credentials/vertex/service-account.json
key_file = ai_module/credentials/vertex/service-account.json
